<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IDS — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #090e17;
      --surface:   #0d1520;
      --border:    #1a2e45;
      --accent:    #00e5ff;
      --accent2:   #ff4d6d;
      --text:      #cdd9e5;
      --muted:     #4a6278;
      --success:   #00e676;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Rajdhani', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridScroll {
      0%   { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    /* Glowing orb */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.07) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
      50%       { transform: translate(-50%,-50%) scale(1.1); opacity: 1; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 420px;
      padding: 48px 40px;
      box-shadow: 0 0 60px rgba(0,229,255,0.08), 0 20px 60px rgba(0,0,0,0.6);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Corner decorations */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: var(--accent);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,229,255,0.06);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 3px;
      padding: 10px 20px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      fill: var(--accent);
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 1.05rem;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    h2 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #fff;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .subtitle {
      text-align: center;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-bottom: 36px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
    }

    .error-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,77,109,0.08);
      border: 1px solid rgba(255,77,109,0.3);
      border-radius: 3px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--accent2);
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    button[type="submit"] {
      width: 100%;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--sans);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 14px;
      border-radius: 3px;
      cursor: pointer;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
      transition: color 0.25s, box-shadow 0.25s;
    }

    button[type="submit"]::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
      z-index: -1;
    }

    button[type="submit"]:hover {
      color: #000;
      box-shadow: 0 0 20px rgba(0,229,255,0.3);
    }

    button[type="submit"]:hover::before {
      transform: scaleX(1);
    }

    .hint {
      text-align: center;
      font-family: var(--mono);
      font-size: 0.66rem;
      color: var(--muted);
      margin-top: 24px;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-badge">
        <svg class="logo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93C9.33 17.79 7 14.5 7 11V7.18L12 5z"/>
        </svg>
        <span class="logo-text">CAMPUS-IDS</span>
      </div>
    </div>

    <h2>Secure Access</h2>
    <p class="subtitle">// NETWORK INTRUSION DETECTION SYSTEM //</p>

    {% if error %}
    <div class="error-box">
      <span>⛔</span> {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label for="username">// Username</label>
        <input type="text" id="username" name="username" placeholder="admin" autocomplete="off" required />
      </div>
      <div class="form-group">
        <label for="password">// Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit">[ AUTHENTICATE ]</button>
    </form>

    <p class="hint">Authorized personnel only &nbsp;|&nbsp; Campus Network Security</p>
  </div>
</body>
</html>
